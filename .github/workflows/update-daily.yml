name: Update daily indicators

on:
  schedule:
    # 03:17 UTC daily -- after US/EU market close and after Tadawul's own close,
    # off the top of the hour to avoid the cron traffic spike.
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "scripts/fetch_daily.py"
      - ".github/workflows/update-daily.yml"

permissions:
  contents: write

concurrency:
  group: update-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch daily indicators
        run: node scripts/fetch-daily.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/daily.json docs/data/daily-history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily indicator update ($(date -u +%Y-%m-%d))"
            git push
          fi
